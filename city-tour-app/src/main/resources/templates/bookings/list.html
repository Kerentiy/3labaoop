<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бронирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { color: #667eea; text-align: center; margin-bottom: 30px; }
        .search-card { background: #f7fafc; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-calendar-check"></i> Бронирования</h2>
            
            <!-- БЛОК ПОИСКА ПО ID ПОКУПАТЕЛЯ -->
            <div class="search-card">
                <form method="get" action="/bookings" class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-bold">
                            <i class="fas fa-user-search"></i> Поиск по ID покупателя:
                        </label>
                        <input type="number" name="customerId" class="form-control" 
                               placeholder="Введите ID покупателя" 
                               th:value="${param.customerId}">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100 me-2">
                            <i class="fas fa-search"></i> Найти
                        </button>
                        <a href="/bookings" class="btn btn-secondary">
                            <i class="fas fa-undo"></i> Сбросить
                        </a>
                    </div>
                </form>
            </div>
            
            <!-- ИНФОРМАЦИЯ О ФИЛЬТРЕ -->
            <div th:if="${filtered}" class="alert alert-info">
                <i class="fas fa-user"></i> 
                <strong>Бронирования покупателя ID: <span th:text="${selectedCustomerId}"></span></strong>
            </div>
            
            <!-- ТАБЛИЦА БРОНИРОВАНИЙ -->
            <table class="table table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>ID покупателя</th>
                        <th>Экскурсия</th>
                        <th>Кол-во человек</th>
                        <th>Дата бронирования</th>
                        <th>Итоговая цена</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.id}">-</td>
                        <td><strong th:text="${booking.customer.customerId}">-</strong></td>
                        <td th:text="${booking.excursion.name}">-</td>
                        <td th:text="${booking.peopleCount}">0</td>
                        <td th:text="${#temporals.format(booking.bookingDate, 'dd.MM.yyyy HH:mm')}">-</td>
                        <td th:text="${booking.totalPrice} + ' ₽'">0</td>
                    </tr>
                    <tr th:if="${bookings.empty}">
                        <td colspan="6" class="text-center">Нет бронирований</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="mt-4 text-center">
                <a href="/" class="btn btn-primary">🏠 На главную</a>
            </div>
        </div>
    </div>
</body>
</html>
