spring:
  application:
    name: city-tour-app
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true
  datasource:
    url: jdbc:postgresql://localhost:5432/citytourdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE