<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бронирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .main-card { 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding: 30px; 
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🏙️ City Tour Manager</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link" href="/add-city">+ CityTour</a>
                <a class="nav-link" href="/add-museum">+ MuseumTour</a>
                <a class="nav-link" href="/bookings">Бронирования</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="main-card">
            <h2 class="mb-4">📋 Список бронирований</h2>
            
            <div th:if="${bookings != null and !bookings.isEmpty()}">
                <table class="table table-hover table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Экскурсия</th>
                            <th>Кол-во человек</th>
                            <th>Дата бронирования</th>
                            <th>Итоговая цена</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.id}"></td>
                            <td th:text="${booking.excursion.name}"></td>
                            <td th:text="${booking.peopleCount}"></td>
                            <td th:text="${#temporals.format(booking.bookingDate, 'dd.MM.yyyy HH:mm')}"></td>
                            <td th:text="${booking.totalPrice} + ' ₽'"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div th:if="${bookings == null or bookings.isEmpty()}" class="alert alert-info text-center">
                Пока нет бронирований.
            </div>
            
            <div class="mt-3">
                <a href="/" class="btn btn-primary">На главную</a>
            </div>
        </div>
    </div>
</body>
</html>
